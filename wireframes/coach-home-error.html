<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Кабінет тренера — помилка — Stack (wireframe 5.2 · error)</title>
<link rel="stylesheet" href="_wf.css">
<style>
/* node 5.2 Кабінет тренера — ERROR. No dead end: retry → base + go home. Greyscale. */
.cerr { max-width: 520px; margin: 40px auto 60px; text-align: center; border: 1.5px dashed var(--hair2); border-radius: 16px; padding: 44px 26px; }
.cerr .ic { width: 60px; height: 60px; margin: 0 auto 18px; border-radius: 50%; border: 1.5px solid var(--hair2); display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--sec); }
.cerr h1 { font-size: 21px; font-weight: 800; color: var(--strong); }
.cerr p { font-size: 14px; color: var(--sec); margin-top: 10px; line-height: 1.6; }
.cerr .acts { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
</style>
</head>
<body>
<!-- WIREFRAME · node 5.2 Кабінет тренера — ERROR. Never a dead end: retry + home. -->
<div class="wf-bar" id="wf-bar"></div>
<div class="wf-canvas">
<header id="wf-header"></header>

<main class="wf-page">
  <nav class="crumb" aria-label="Хлібні крихти">
    <a href="home.html">Головна</a><span class="sep">/</span>
    <span class="cur">Кабінет тренера</span>
  </nav>

  <section class="cerr" role="alert">
    <div class="ic" aria-hidden="true">⚠</div>
    <h1>Не вдалося завантажити кабінет</h1>
    <p>Сталася помилка під час завантаження даних кабінету тренера. Перевірте з'єднання та спробуйте ще раз.</p>
    <div class="acts">
      <a class="btn dark" href="coach-home.html">Спробувати ще раз</a>
      <a class="btn" href="home.html">На головну</a>
    </div>
  </section>
</main>

<footer id="wf-footer"></footer>
</div>

<script src="_nav.js"></script>
<script>wfHeader('coach'); wfFooter(); wfBar('coach-home.html','error');</script>
</body>
</html>
