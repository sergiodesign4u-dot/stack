<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Видалити клієнта? — Кабінет тренера (wireframe 5.4a · confirm)</title>
<link rel="stylesheet" href="_wf.css">
<style>
/* node 5.4a REFERENCE — CONFIRM state of the SHARED wfClientEdit() modal, pinned
   over the dimmed client profile. Same component as coach-client.html inline. */
#wf-bar { position: relative; z-index: 80; }
.ce-behind { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
.ce-behind .crumb { margin-bottom: 14px; }
.ce-ph { border: 1px solid var(--hair); border-radius: 12px; padding: 18px; }
.ce-ph .h { display: flex; align-items: center; gap: 14px; }
.ce-ph .av { width: 54px; height: 54px; border-radius: 50%; background: var(--fill); border: 1px solid var(--hair); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: var(--light); }
.ce-ph .nm { font-size: 18px; font-weight: 800; color: var(--strong); }
.ce-ph .gl { font-size: 13px; color: var(--sec); margin-top: 3px; }
.ce-ph .bar { height: 12px; background: var(--fill); border-radius: 6px; margin: 18px 0; }
.ce-ph .bar.s { width: 60%; }
</style>
</head>
<body>
<!-- ============================================================
  WIREFRAME · node 5.4a — CONFIRM (delete dialog) REFERENCE render. Renders the
  SHARED wfClientEdit() component in its confirm state, pinned over the dimmed
  profile. «Скасувати» → back to edit; «Видалити» → coach-clients (client gone).
============================================================ -->
<div class="wf-bar" id="wf-bar"></div>
<div class="wf-canvas">
<header id="wf-header"></header>

<main class="ce-behind" aria-hidden="true">
  <nav class="crumb"><a href="home.html">Головна</a><span class="sep">/</span>
    <a href="coach-home.html">Кабінет тренера</a><span class="sep">/</span><a href="coach-clients.html">Клієнти</a><span class="sep">/</span><span class="cur">Андрій</span></nav>
  <div class="ce-ph">
    <div class="h"><div class="av">А</div><div><div class="nm">Андрій</div><div class="gl">Ціль: Набір маси · 8 замовлень</div></div></div>
    <div class="bar"></div><div class="bar s"></div>
  </div>
</main>

<footer id="wf-footer"></footer>
</div>
<div id="wf-client-edit"></div>
<div id="wf-toast"></div>

<script src="_nav.js"></script>
<script>wfHeader('coach'); wfFooter(); wfToasts(); openClientDelete(); wfBar('coach-client-edit.html', 'confirm');</script>
</body>
</html>
