<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Бренди — завантаження — Stack (wireframe 2.4, loading)</title>
<link rel="stylesheet" href="_wf.css">
<style>
/* node 2.4 Бренди — LOADING (skeleton grid). Toolbar shell + skeleton brand cards. */
.btoolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 18px 0 6px; }
.bsearch { flex: 1 1 240px; min-width: 180px; display: flex; align-items: center; gap: 8px; border: 1.5px solid var(--hair2); border-radius: 10px; padding: 10px 13px; background: #fff; }
.bsearch .mag { font-size: 14px; color: var(--light); }
.bsearch input { flex: 1; border: none; outline: none; font-size: 13.5px; color: var(--strong); background: transparent; }
.bsearch input::placeholder { color: var(--light); }
.bsel { border: 1.5px solid var(--hair2); border-radius: 10px; padding: 10px 13px; font-size: 13px; font-weight: 700; color: var(--strong); background: #fff; }
/* skeleton brand card: logo box (skimg) + two lines */
.skcard .sklogo { height: 54px; margin: 0; background: var(--fill); border-radius: 8px; }
</style>
</head>
<body>
<!-- ============================================================
  WIREFRAME · node 2.4 Бренди — LOADING. Skeleton A–Z grid + loadnote.
============================================================ -->
<div class="wf-bar" id="wf-bar"></div>
<div class="wf-canvas">
<header id="wf-header"></header>

<main class="wf-page">

  <nav class="crumb" aria-label="Хлібні крихти">
    <a href="home.html">Головна</a><span class="sep">/</span>

      <b>тільки з оригінальною, сертифікованою продукцією</b> з гарантією виробника.</p>
  </section>

  <div class="btoolbar">
    <label class="bsearch"><span class="mag">🔎</span>
      <input type="text" placeholder="Пошук бренду…" aria-label="Пошук бренду">
    </label>
    <span class="bsel">Країна: всі ▾</span>
    <span class="bsel">Категорія: всі ▾</span>
  </div>

    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
    <div class="skcard"><div class="skb"><div class="sklogo"></div><div class="skline l"></div><div class="skline s"></div></div></div>
  </div>
  <p class="loadnote">Завантажуємо бренди…</p>

</main>

<footer id="wf-footer"></footer>
</div><!-- /wf-canvas -->

<script src="_nav.js"></script>

</html>
