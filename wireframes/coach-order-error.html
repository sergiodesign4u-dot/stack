<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Замовлення № К-2041 — помилка (wireframe 5.7 · error)</title>
<link rel="stylesheet" href="_wf.css">
<style>
/* ============================================================
   node 5.7 Деталі замовлення тренера — one placed order, GROUPED BY
   CLIENT (same grouping as coach cart 6.0). Header + single delivery
   to the coach + per-client sections (coach-tier price) + grand total
   + per-client repeat (Job 4). Private → noindex. States: loading · error.
   ============================================================ */
.od-wrap { max-width: 900px; }
.od-back { font-size: 12.5px; font-weight: 700; color: var(--strong); text-decoration: underline; }

/* header card */
.od-head { border: 1px solid var(--hair); border-radius: 14px; padding: 18px; margin: 12px 0 16px; }
.od-head-t { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.od-no { font-size: 20px; font-weight: 800; color: var(--strong); letter-spacing: -.01em; }
.od-date { font-size: 13px; color: var(--sec); }
.od-status { display: inline-block; font-size: 11.5px; font-weight: 800; border: 1px solid var(--hair2); border-radius: 100px; padding: 3px 11px; color: var(--strong); }
.od-facts { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 14px; }
@media (min-width: 620px) { .od-facts { grid-template-columns: 1fr 1fr; } }
.od-fact .fk { font-size: 11px; color: var(--light); text-transform: uppercase; letter-spacing: .03em; font-weight: 700; }
.od-fact .fv { font-size: 13px; color: var(--strong); font-weight: 600; margin-top: 3px; }
.od-fact .fv span { display: block; font-weight: 400; color: var(--sec); font-size: 12.5px; }
.od-paid::before { content: "✓ "; font-weight: 900; }

/* per-client group (mirrors cart-coach grouping) */
.od-grp { border: 1px solid var(--hair); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.od-grp-h { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 15px; background: var(--fill2); border-bottom: 1px solid var(--hair); }
.od-grp-h .gc { font-size: 14px; font-weight: 800; color: var(--strong); }
.od-grp-h .gg { font-size: 12px; color: var(--sec); font-weight: 600; }
.od-grp-h .gs { font-size: 15px; font-weight: 800; color: var(--strong); white-space: nowrap; }
.od-line { display: grid; grid-template-columns: 48px 1fr auto; gap: 12px; padding: 12px 15px; border-bottom: 1px solid var(--hair); align-items: center; }
.od-line:last-child { border-bottom: none; }
.od-ph { width: 48px; height: 52px; border-radius: 8px; background: var(--fill); border: 1px solid var(--hair); display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 9px; }
.od-nm { font-size: 13.5px; font-weight: 700; color: var(--strong); line-height: 1.3; }
.od-var { font-size: 12px; color: var(--sec); margin-top: 2px; }
.cprice { font-size: 15px; font-weight: 800; color: var(--strong); white-space: nowrap; text-align: right; }
.cprice .old { display: block; font-size: 11.5px; font-weight: 500; color: #aaa; text-decoration: line-through; }
.cprice .wtag { display: inline-block; font-size: 9.5px; font-weight: 800; color: var(--strong); border: 1px solid var(--hair2); border-radius: 4px; padding: 0 4px; margin-left: 5px; vertical-align: middle; }
.od-grp-f { padding: 11px 15px; display: flex; justify-content: flex-end; }
.od-repeat1 { font-size: 12px; font-weight: 700; color: var(--strong); text-decoration: underline; }

/* grand total + actions */
.od-tot { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; border-top: 1.5px solid var(--hair2); padding: 14px 2px 2px; margin-top: 2px; }
.od-tot .l { font-size: 15px; font-weight: 800; color: var(--strong); }
.od-tot .l small { display: block; font-size: 11.5px; font-weight: 600; color: var(--sec); }
.od-tot .v { font-size: 24px; font-weight: 800; color: var(--strong); }
.od-acts { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
.ord-empty, .ord-err { text-align: center; border: 1px solid var(--hair); border-radius: 14px; padding: 44px 24px; }
.ord-empty .ei { font-size: 36px; }
.ord-empty .et, .ord-err .et { font-size: 19px; font-weight: 800; color: var(--strong); margin: 12px 0 6px; }
.ord-empty .es, .ord-err .es { font-size: 13.5px; color: var(--sec); max-width: 460px; margin: 0 auto 20px; line-height: 1.5; }
.ord-acts-c { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.ord.skel { pointer-events: none; }
.skln { height: 12px; border-radius: 6px; background: #ececec; margin: 8px 0; }
.skgrp { border: 1px solid var(--hair); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
</style>
</head>
<body>
<!-- ============================================================
  WIREFRAME · node 5.7 Деталі замовлення — ERROR (retry).
  Order № К-2041, grouped by client. Single delivery to the coach.

============================================================ -->

<main class="wf-page od-wrap">
  <nav class="crumb" aria-label="Хлібні крихти">
    <a href="home.html">Головна</a><span class="sep">/</span>
    <a href="coach-home.html">Кабінет тренера</a><span class="sep">/</span>
    <a href="coach-orders.html">Замовлення</a><span class="sep">/</span>
    <span class="cur">№ К-2041</span>
  </nav>

  <div class="ord-err" role="alert">
    <div class="et">Не вдалося завантажити замовлення</div>
    <div class="es">Перевірте зʼєднання й спробуйте ще раз.</div>
    <div class="ord-acts-c">
      <a class="btn dark" href="coach-order.html">↻ Спробувати ще</a>
      <a class="btn" href="coach-orders.html">← Усі замовлення</a>
    </div>
  </div>

</main>

<footer id="wf-footer"></footer>
</div>

<script src="_nav.js"></script>
<script>wfHeader('coach'); wfFooter(); wfBar('coach-order.html', 'error');</script>
