<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Кабінет тренера — завантаження — Stack (wireframe 5.2 · loading)</title>
<link rel="stylesheet" href="_wf.css">
<style>
/* node 5.2 Кабінет тренера — LOADING skeleton (static, no animation). Greyscale. */
.acc { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 16px; }
@media (min-width: 960px) { .acc { grid-template-columns: 268px 1fr; gap: 28px; } }
.acc-nav { align-self: start; }
.sk { background: var(--fill); border-radius: 8px; border: 1px solid var(--hair); }
.sk.line { height: 12px; }
.sk-prof { border: 1px solid var(--hair); border-radius: 14px; padding: 15px 16px; display: flex; gap: 13px; align-items: center; }
.sk-prof .av { width: 48px; height: 48px; border-radius: 50%; flex: none; }
.sk-prof .who { flex: 1; display: flex; flex-direction: column; gap: 7px; }
.sk-links { margin-top: 12px; border: 1px solid var(--hair); border-radius: 14px; overflow: hidden; }
.sk-links .row { padding: 15px; border-bottom: 1px solid var(--hair); }
.sk-links .row:last-child { border-bottom: none; }
.sk-h1 { height: 26px; width: 55%; }
.sk-sub { height: 13px; width: 80%; margin-top: 10px; }
.sk-strip { height: 48px; margin-top: 15px; border-radius: 12px; }
.sk-cta { height: 86px; margin-top: 16px; border-radius: 14px; }
.acc-grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 18px; }
.sk-card { height: 150px; border-radius: 14px; }
.sk-load { display: flex; align-items: center; gap: 10px; margin-top: 22px; color: var(--sec); font-size: 13px; font-weight: 600; justify-content: center; }
.sk-spin { width: 16px; height: 16px; border: 2px solid var(--hair2); border-top-color: var(--dark); border-radius: 50%; }
</style>
</head>
<body>
<!-- WIREFRAME · node 5.2 Кабінет тренера — LOADING. Static skeleton of the dashboard. -->
<div class="wf-bar" id="wf-bar"></div>
<div class="wf-canvas">
<header id="wf-header"></header>

<main class="wf-page">
  <nav class="crumb" aria-label="Хлібні крихти">
    <a href="home.html">Головна</a><span class="sep">/</span>
    <span class="cur">Кабінет тренера</span>
  </nav>

  <div class="acc" aria-busy="true">
    <aside class="acc-nav">
      <div class="sk-prof">
        <div class="sk av"></div>
        <div class="who"><div class="sk line" style="width:60%"></div><div class="sk line" style="width:85%"></div></div>
      </div>
      <div class="sk-links">
        <div class="row"><div class="sk line" style="width:50%"></div></div>
        <div class="row"><div class="sk line" style="width:65%"></div></div>
        <div class="row"><div class="sk line" style="width:45%"></div></div>
        <div class="row"><div class="sk line" style="width:60%"></div></div>
        <div class="row"><div class="sk line" style="width:40%"></div></div>
      </div>
    </aside>

    <div class="acc-main">
      <div class="sk sk-h1"></div>
      <div class="sk sk-sub"></div>
      <div class="sk sk-strip"></div>
      <div class="sk sk-cta"></div>
      <div class="acc-grid">
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
      </div>
      <div class="sk-load"><span class="sk-spin" aria-hidden="true"></span> Завантажуємо кабінет…</div>
    </div>
  </div>
</main>

<footer id="wf-footer"></footer>
</div>

<script src="_nav.js"></script>
<script>wfHeader(); wfFooter(); wfBar('coach-home.html','loading');</script>
</body>
</html>
