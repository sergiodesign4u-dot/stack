<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Кабінет покупця — завантаження — Stack (wireframe 7.0 · завантаження)</title>
<link rel="stylesheet" href="_wf.css">
<style>
/* Shell layout shared with account.html; skeletons reuse .skcard/.skline/.skpulse. */
.acc { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 16px; }
@media (min-width: 960px) { .acc { grid-template-columns: 268px 1fr; gap: 28px; } }
.acc-nav { align-self: start; }
@media (min-width: 960px) { .acc-nav { position: sticky; top: 120px; } }
.acc-prof { border: 1px solid var(--hair); border-radius: 14px; padding: 15px 16px; display: flex; gap: 13px; align-items: center; }
.acc-prof .av { width: 48px; height: 48px; border-radius: 50%; background: var(--fill); flex: none; }
.acc-prof .who { flex: 1; }
.acc-links { margin-top: 12px; border: 1px solid var(--hair); border-radius: 14px; overflow: hidden; }
.acc-link { display: flex; align-items: center; gap: 11px; padding: 15px 15px; border-bottom: 1px solid var(--hair); }
.acc-link:last-child { border-bottom: none; }
.acc-h1sk { height: 24px; width: 240px; border-radius: 6px; background: #ececec; margin-top: 2px; }
.acc-subsk { height: 12px; width: 320px; max-width: 80%; border-radius: 5px; background: #ececec; margin-top: 12px; }
.acc-cardgrid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 22px; }
@media (min-width: 640px) { .acc-cardgrid { grid-template-columns: 1fr 1fr; } }
.skcardbox { border: 1px solid var(--hair); border-radius: 14px; padding: 16px; }
.skcardbox.span2 { grid-column: 1 / -1; }
.skcardbox .skline { background: #ececec; }
</style>
</head>
<body>
<!-- ============================================================
  WIREFRAME · node 7.0 STATE = loading. Shell chrome is instant;
  the snapshot data loads as greyscale skeletons (skpulse cue).
  Transient — resolves to base (account.html) or error (account-error.html).
============================================================ -->
<div class="wf-bar" id="wf-bar"></div>
<div class="wf-canvas">
<header id="wf-header"></header>

<main class="wf-page">
  <nav class="crumb" aria-label="Хлібні крихти">
    <a href="home.html">Головна</a><span class="sep">/</span>
    <span class="cur">Кабінет</span>
  </nav>

  <div class="acc" aria-busy="true">

    <!-- section nav skeleton -->
    <aside class="acc-nav skpulse">
      <div class="acc-prof">
        <div class="av"></div>
        <div class="who"><div class="skline l"></div><div class="skline m"></div></div>
      </div>
      <div class="acc-links">
        <div class="acc-link"><div class="skline m" style="width:60%;margin:0"></div></div>
        <div class="acc-link"><div class="skline m" style="width:70%;margin:0"></div></div>
        <div class="acc-link"><div class="skline m" style="width:55%;margin:0"></div></div>
        <div class="acc-link"><div class="skline m" style="width:65%;margin:0"></div></div>
        <div class="acc-link"><div class="skline m" style="width:50%;margin:0"></div></div>
        <div class="acc-link"><div class="skline m" style="width:60%;margin:0"></div></div>
      </div>
    </aside>

    <!-- dashboard skeleton -->
    <div class="acc-main">
      <div class="acc-h1sk skpulse"></div>
      <div class="acc-subsk skpulse"></div>

      <div class="acc-cardgrid skpulse">
        <div class="skcardbox"><div class="skline s"></div><div class="skline l" style="height:28px;width:40%;margin:14px 0"></div><div class="skline m"></div></div>
        <div class="skcardbox"><div class="skline s"></div><div class="skline m" style="margin:14px 0"></div><div class="skline l"></div><div class="skline m"></div></div>
        <div class="skcardbox span2"><div class="skline s"></div><div class="skline m" style="margin:14px 0"></div><div class="skline l"></div><div class="skline s"></div></div>
        <div class="skcardbox"><div class="skline s"></div><div class="skline m" style="margin:14px 0"></div><div class="skline l"></div></div>
        <div class="skcardbox"><div class="skline s"></div><div class="skline m" style="margin:14px 0"></div><div class="skline l"></div></div>
      </div>

      <!-- wishlist skeleton = product-card skeletons -->
      <div class="skgrid skpulse" style="margin-top:26px">
        <div class="skcard"><div class="skimg"></div><div class="skb"><div class="skline s"></div><div class="skline l"></div><div class="skline m"></div><div class="skline s"></div></div></div>
        <div class="skcard"><div class="skimg"></div><div class="skb"><div class="skline s"></div><div class="skline l"></div><div class="skline m"></div><div class="skline s"></div></div></div>
        <div class="skcard"><div class="skimg"></div><div class="skb"><div class="skline s"></div><div class="skline l"></div><div class="skline m"></div><div class="skline s"></div></div></div>
        <div class="skcard"><div class="skimg"></div><div class="skb"><div class="skline s"></div><div class="skline l"></div><div class="skline m"></div><div class="skline s"></div></div></div>
      </div>
      <p class="loadnote">Завантажуємо ваш кабінет…</p>
    </div>
  </div>
</main>

<footer id="wf-footer"></footer>
</div>

<script src="_nav.js"></script>
<script>wfHeader(); wfFooter(); wfBar('account.html', 'loading');</script>
</body>
</html>
