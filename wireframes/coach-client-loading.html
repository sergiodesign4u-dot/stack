<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Профіль клієнта — завантаження… (wireframe 5.4 · loading)</title>
<link rel="stylesheet" href="_wf.css">
<style>
/* node 5.4 Профіль клієнта — LOADING: static skeleton of the history. */
.cc-wrap { max-width: 900px; }
.ch { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin: 8px 0 6px; }
.ch-id { display: flex; align-items: center; gap: 14px; min-width: 0; }
.ch-av { width: 56px; height: 56px; border-radius: 50%; background: var(--fill); border: 1px solid var(--hair); flex: none; display: flex; align-items: center; justify-content: center; color: var(--light); font-size: 21px; font-weight: 800; }
.ch-name { font-size: 24px; font-weight: 800; color: var(--strong); letter-spacing: -.01em; }
.ch-goal { display: inline-flex; align-items: center; gap: 5px; margin-top: 6px; font-size: 12px; font-weight: 800; border: 1.5px solid var(--dark); border-radius: 100px; padding: 3px 11px; color: var(--strong); }
.ch-edit { font-size: 12.5px; font-weight: 700; color: var(--strong); border: 1.5px solid var(--hair2); border-radius: 8px; padding: 9px 15px; white-space: nowrap; }
.cc-cta { margin: 18px 0 26px; }
.cc-cta .btn { padding: 13px 22px; }
.oh-h { font-size: 15px; font-weight: 800; color: var(--strong); margin: 0 0 12px; }

/* skeleton */
.sk { background: var(--fill); border-radius: 6px; }
.ohist { display: flex; flex-direction: column; gap: 14px; }
.skcard { border: 1px solid var(--hair); border-radius: 12px; padding: 15px 16px; }
.sk-top { display: flex; justify-content: space-between; }
.sk-line { height: 13px; }
.sk-row { display: grid; grid-template-columns: 40px 1fr 70px; gap: 11px; align-items: center; padding: 12px 0; border-top: 1px solid var(--hair); margin-top: 10px; }
.sk-ph { width: 40px; height: 40px; border-radius: 7px; }
.sk-actions { display: flex; gap: 9px; margin-top: 14px; }
.sk-btn { height: 38px; width: 120px; border-radius: 8px; }
.load-note { text-align: center; font-size: 12.5px; color: var(--light); margin-top: 20px; }
</style>
</head>
<body>
<!-- WIREFRAME · node 5.4 Профіль клієнта (LOADING). Static skeleton of client order history. -->
<div class="wf-bar" id="wf-bar"></div>
<div class="wf-canvas">
<header id="wf-header"></header>

<main class="wf-page cc-wrap" aria-busy="true">
  <nav class="crumb" aria-label="Хлібні крихти">
    <a href="home.html">Головна</a><span class="sep">/</span>
    <a href="coach-home.html">Кабінет тренера</a><span class="sep">/</span>
    <a href="coach-clients.html">Клієнти</a><span class="sep">/</span>
    <span class="cur">Андрій</span>
  </nav>

  <div class="ch">
    <div class="ch-id">
      <div class="ch-av">А</div>
      <div>
        <div class="ch-name">Андрій</div>
        <span class="ch-goal">🎯 Ціль: Набір маси</span>
      </div>
    </div>
    <a class="ch-edit" href="coach-client-edit.html">Редагувати клієнта</a>
  </div>

  <div class="cc-cta"><a class="btn dark" href="coach-session.html">＋ Нова сесія для клієнта</a></div>

  <h2 class="oh-h">Історія замовлень клієнта</h2>
  <div class="ohist" aria-hidden="true">
    <div class="skcard">
      <div class="sk-top"><div class="sk sk-line" style="width:130px"></div><div class="sk sk-line" style="width:90px"></div></div>
      <div class="sk-row"><div class="sk sk-ph"></div><div class="sk sk-line" style="width:70%"></div><div class="sk sk-line"></div></div>
      <div class="sk-row"><div class="sk sk-ph"></div><div class="sk sk-line" style="width:55%"></div><div class="sk sk-line"></div></div>
      <div class="sk-actions"><div class="sk sk-btn"></div><div class="sk sk-btn" style="width:90px"></div></div>
    </div>
    <div class="skcard">
      <div class="sk-top"><div class="sk sk-line" style="width:130px"></div><div class="sk sk-line" style="width:90px"></div></div>
      <div class="sk-row"><div class="sk sk-ph"></div><div class="sk sk-line" style="width:65%"></div><div class="sk sk-line"></div></div>
      <div class="sk-row"><div class="sk sk-ph"></div><div class="sk sk-line" style="width:50%"></div><div class="sk sk-line"></div></div>
      <div class="sk-actions"><div class="sk sk-btn"></div><div class="sk sk-btn" style="width:90px"></div></div>
    </div>
  </div>
  <p class="load-note">Завантажуємо історію клієнта…</p>
</main>

<footer id="wf-footer"></footer>
</div>

<script src="_nav.js"></script>
<script>wfHeader(); wfFooter(); wfBar('coach-client.html', 'loading');</script>
</body>
</html>
